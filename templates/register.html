<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI MedAssistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>📋 Patient Registration</h2>
        <p style="color: var(--text-light); margin-bottom: 20px;">Create a secure account to track your health</p>
        
        <form method="POST">
            <input name="username" placeholder="Choose a Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Create Password" required>
            <button class="btn-main" style="margin-top: 15px;">Create Account ✨</button>
        </form>
        
        <a href="/login" class="auth-links">Already have an account? <strong>Login</strong></a>
    </div>
</div>

</body>
</html>
